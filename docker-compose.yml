name: metronome

services:
  metronome:
    build: .
    ports:
      - "${METRONOME_PORT:-3000}:3000"
    environment:
      PORT: "3000"
      METRONOME_DB_PATH: /app/data/metronome.sqlite
      METRONOME_API_TOKEN: "${METRONOME_API_TOKEN:-}"
    volumes:
      - metronome-data:/app/data
    restart: unless-stopped

volumes:
  metronome-data:
    # Persist user settings and presets across image rebuilds.
    # Pinning the volume name decouples it from the compose project name
    # so renaming the repo or directory does not strand the old volume.
    name: metronome-data
