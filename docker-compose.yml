name: metronome

services:
  metronome:
    build: .
    ports:
      - "${METRONOME_PORT:-3000}:3000"
    environment:
      PORT: "3000"
      METRONOME_DB_PATH: /app/data/metronome.sqlite
    volumes:
      - metronome-data:/app/data
    restart: unless-stopped

volumes:
  metronome-data:
    name: metronome-data
