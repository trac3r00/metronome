<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#101114">
    <title>Church Broadcast Metronome</title>
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="icon" href="/icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/styles.css">
    <script type="module" src="/app.js"></script>
  </head>
  <body>
    <main class="app-shell">
      <section class="stage" aria-label="Live metronome stage">
        <div class="topbar">
          <div id="connection" class="connection" aria-live="polite">
            <span class="connection-dot" aria-hidden="true"></span>
            <span data-status-text>Connecting</span>
          </div>
          <button id="fullscreen" class="icon-button" type="button" aria-label="Enter fullscreen">⛶</button>
        </div>
        <div class="stage-center">
          <div id="flash" class="pulse-ring" aria-hidden="true">
            <span data-beat-label>1</span>
          </div>
          <div class="tempo-readout" aria-live="polite">
            <span id="bpm-display">120</span>
            <span>BPM</span>
          </div>
          <span id="meter-display" class="meter-pill">4/4</span>
        </div>
        <div id="message" class="message" role="status" aria-live="polite"></div>
        <button id="play" class="play-button" type="button" aria-label="Start metronome">Start</button>
      </section>

      <section class="controls" aria-label="Metronome controls">
        <div class="panel-heading">
          <p>Tempo</p>
          <span>30-300 BPM</span>
        </div>
        <div class="bpm-control">
          <label for="bpm-range">BPM slider</label>
          <input id="bpm-range" type="range" min="30" max="300" value="120" aria-label="BPM slider">
          <input id="bpm-number" type="number" min="30" max="300" value="120" inputmode="numeric" aria-label="BPM number">
        </div>

        <div class="panel-heading compact">
          <p>Meter</p>
        </div>
        <div class="meter-group" role="group" aria-label="Beat meter">
          <button class="meter-button" type="button" data-meter="4/4">4/4</button>
          <button class="meter-button" type="button" data-meter="3/4">3/4</button>
          <button class="meter-button" type="button" data-meter="6/8">6/8</button>
        </div>

        <button id="tap" class="secondary-button" type="button">Tap Tempo</button>

        <div class="panel-heading presets-heading">
          <p>Presets</p>
          <span>Save or recall room tempos</span>
        </div>
        <div id="preset-grid" class="preset-grid"></div>
      </section>
    </main>
  </body>
</html>
