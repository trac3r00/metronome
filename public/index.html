<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0D9488">
    <title>Church Broadcast Metronome</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Righteous&display=swap" rel="stylesheet">
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="icon" href="/icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/styles.css">
    <script type="module" src="/app.js"></script>
  </head>
  <body class="stage-page">
    <main class="app-shell app-shell--stage">
      <section class="stage" aria-label="Live metronome stage">
        <header class="topbar">
          <div id="connection" class="connection" aria-live="polite">
            <span class="connection-dot" aria-hidden="true"></span>
            <span data-status-text>Connecting</span>
          </div>
          <div class="topbar-actions">
            <button id="share" class="icon-button" type="button" aria-label="Quick share">вӨҙ</button>
            <a class="icon-button" href="/settings" aria-label="Open settings">вҡҷ</a>
          </div>
        </header>

        <div class="stage-grid">
          <section class="tempo-panel" aria-label="Tempo">
            <div id="beat-indicator" class="beat-indicator" aria-label="Current beat"></div>
            <div class="bpm-row">
              <button id="bpm-minus" class="step-button" type="button" aria-label="Decrease BPM" data-stage-control>вҲ’</button>
              <div class="tempo-readout" aria-live="polite">
                <span id="bpm-display">120</span>
                <span>BPM</span>
              </div>
              <button id="bpm-plus" class="step-button" type="button" aria-label="Increase BPM" data-stage-control>+</button>
            </div>
            <div id="tempo-control" class="tempo-control" aria-label="Tempo controller"></div>
          </section>

          <section class="live-controls" aria-label="Live controls">
            <div class="meter-tap-row">
              <div id="meter-group" class="meter-group" role="group" aria-label="Meter"></div>
              <button id="tap-tempo" class="tap-button" type="button" data-stage-control>TAP</button>
            </div>
            <div class="preset-strip" aria-label="Presets">
              <div id="preset-track" class="preset-track"></div>
              <button id="edit-presets" class="preset-edit" type="button" data-stage-control>+ Edit</button>
            </div>
            <p id="message" class="message" role="status" aria-live="polite"></p>
            <button id="play" class="play-button" type="button" aria-label="Start metronome" data-stage-control>START</button>
          </section>
        </div>

        <footer class="shortcut-help">
          Space=Start/Stop В· вҶ‘вҶ“=BPM Вұ1 В· Shift+вҶ‘вҶ“=Вұ5 В· T=Tap В· 1/2/3=meter switch
        </footer>
      </section>
    </main>

    <dialog id="share-modal" class="share-modal" aria-labelledby="share-title">
      <article class="share-card">
        <header>
          <h2 id="share-title">Quick Share</h2>
          <button id="share-close" class="icon-button" type="button" aria-label="Close">вң•</button>
        </header>
        <div id="share-qr" class="share-qr" aria-label="QR code"></div>
        <p class="share-hint">Scan with another device on the same Wi-Fi to join</p>
        <code id="share-url" class="share-url"></code>
        <button id="share-copy" class="small-button" type="button">Copy</button>
      </article>
    </dialog>
  </body>
</html>
