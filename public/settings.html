<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0D9488">
    <title>Settings - Church Broadcast Metronome</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Righteous&display=swap" rel="stylesheet">
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="icon" href="/icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/styles.css">
    <script type="module" src="/settings.js"></script>
  </head>
  <body>
    <main class="settings-shell">
      <header class="settings-header">
        <a class="back-link" href="/" aria-label="Back to metronome">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M19 12H5"></path>
            <path d="m12 19-7-7 7-7"></path>
          </svg>
          <span>Back</span>
        </a>
        <h1>Settings</h1>
        <div id="settings-connection" class="connection" aria-live="polite">
          <span class="connection-dot" aria-hidden="true"></span>
          <span data-status-text>Connecting</span>
        </div>
      </header>

      <section class="settings-section" aria-labelledby="presets-heading">
        <div class="section-heading">
          <h2 id="presets-heading">Presets</h2>
          <button id="add-preset" class="small-button" type="button">+ Add preset</button>
        </div>
        <div id="preset-list" class="preset-list"></div>
      </section>

      <section class="settings-section" aria-labelledby="control-heading">
        <div class="section-heading">
          <h2 id="control-heading">Tempo Control Style</h2>
        </div>
        <div id="control-styles" class="radio-card-grid" role="radiogroup" aria-label="Tempo control style"></div>
      </section>

      <section class="settings-section" aria-labelledby="sound-heading">
        <div class="section-heading">
          <h2 id="sound-heading">Sound</h2>
        </div>
        <div id="sound-options" class="radio-card-grid sound-grid" role="radiogroup" aria-label="Metronome sound"></div>
        <label class="volume-control">
          <span>Volume <strong id="volume-value">80%</strong></span>
          <input id="volume-slider" type="range" min="0" max="100" value="80">
        </label>
      </section>

      <section class="settings-section" aria-labelledby="display-heading">
        <div class="section-heading">
          <h2 id="display-heading">Theme</h2>
        </div>
        <div class="field-stack">
          <label>
            <span>Theme</span>
            <select id="theme-select">
              <option value="auto">Auto</option>
              <option value="light">Light</option>
              <option value="dark">Dark</option>
            </select>
          </label>
        </div>
      </section>

      <section class="settings-section" aria-labelledby="sync-heading">
        <div class="section-heading">
          <h2 id="sync-heading">Sync</h2>
        </div>
        <div class="sync-panel">
          <p id="last-synced">Last synced: never</p>
          <button id="force-resync" class="small-button" type="button">Force resync</button>
        </div>
      </section>
    </main>

    <dialog id="preset-modal" class="preset-modal">
      <form method="dialog" id="preset-form">
        <header>
          <h2 id="modal-title">Add Preset</h2>
          <button class="icon-button" value="cancel" type="submit" aria-label="Close">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M18 6 6 18"></path>
              <path d="m6 6 12 12"></path>
            </svg>
          </button>
        </header>
        <input id="preset-id" type="hidden">
        <label>
          <span>BPM</span>
          <input id="preset-bpm" type="number" min="30" max="300" inputmode="numeric" required>
        </label>
        <label>
          <span>Meter</span>
          <select id="preset-meter" required>
            <option value="4/4">4/4</option>
            <option value="3/4">3/4</option>
            <option value="6/8">6/8</option>
          </select>
        </label>
        <label>
          <span>Name</span>
          <input id="preset-name" type="text" maxlength="40">
        </label>
        <menu>
          <button class="small-button ghost" value="cancel" type="submit">Cancel</button>
          <button class="small-button" value="default" type="submit">Save</button>
        </menu>
      </form>
    </dialog>
  </body>
</html>
